<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pokédex Viewer</title>
  <link rel="stylesheet" href="viewer.css" />
</head>
<body>

  <div id="navigation-container">
    <button class="back-button" onclick="location.href='index.html'">
      ← Back to Game Selection
    </button>
    <button class="back-button" onclick="location.href='ability_move_viewer.html?game=' + window.game">
        List of Abilities & Moves →
    </button>
    <button class="back-button" onclick="location.href='trainer_viewer.html?game=' + window.game">
        View Trainers (SPOILERS) →
    </button>
    <button class="back-button" onclick="location.href='teambuilder.html?game=' + window.game">
        Teambuilder →
    </button>
  </div>
  <div id="search-container">
    <input type="text" id="search-bar" placeholder="Search by Anything, good luck!" />
    <input type="text" id="name-search" placeholder="Search by Name" />
    <input type="text" id="type-search" placeholder="Search by Type" />
    <input type="text" id="ability-search" placeholder="Search by Ability" />
    <input type="text" id="move-search" placeholder="Search by Move" />
    <input type="text" id="item-search" placeholder="Search by Held Item" />
    <label class="filter-checkbox">
      <input type="checkbox" id="non-evolving-checkbox" />
      Non-evolving only
    </label>
  </div>

  <button id="reset-button">Reset</button>

  <div id="sort-container">
    <label for="sort-select">Sort by:</label>
    <select id="sort-select">
      <option value="default">Default</option>
      <option value="alphabetical">Alphabetical (A-Z)</option>
    </select>
  </div>

  <div id="external-doc-link" class="external-link">
    <strong>Wonderful 2.0 Pokémon Document by WitchyAlex:</strong>
    <a href="https://docs.google.com/document/d/1q_21bxsX8MwHvNvZXJyaXj_yhOfvph9NaeMFHv29QFI/edit?usp=sharing" target="_blank" rel="noopener noreferrer">
      View the Google Doc
    </a>
  </div>

  <div id="external-doc-link" class="external-link">
    <strong> Beautiful 2.0 abilities document by WitchyAlex:</strong>
    <a href="https://docs.google.com/document/d/1ZJzpknHRxWrZd-iKIBapaNVkZR3tlY2ZNPd9JA87E4w/edit?tab=t.0#heading=h.e5b4nr1v1ccs" target="_blank" rel="noopener noreferrer">
      View the Google Doc
    </a>
  </div>

  <div id="external-doc-link" class="external-link">
    <strong> Beautiful 2.0 abilities document by Riptidecord and WitchyAlex:</strong>
    <a href="https://docs.google.com/document/d/1MNL5UlN6YrEEEFEvw9UU_BhoxI5nyDhd3Hb8QG6p9nk/edit?usp=sharing" target="_blank" rel="noopener noreferrer">
      View the Google Doc
    </a>
  </div>

  <div id="pokedex-container">
    <div id="pokedex-wrapper"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const queryGame = params.get('game');
    window.game = queryGame ? queryGame.toLowerCase() : 'default';
    const displayGame = queryGame
      ? queryGame.charAt(0).toUpperCase() + queryGame.slice(1)
      : 'Game';
  </script>

  <script type="module" src="viewer.js"></script>
</body>
</html>
